---
layout: default
title: Steam Хямдрал
---

<style>
.deals-wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

/* Tabs */
.deals-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.deals-tab {
  padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--card); color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.deals-tab:hover { border-color: #4c6b22; color: var(--text); }
.deals-tab.active { background: #4c6b22; border-color: #4c6b22; color: #a4d007; }

/* Grid */
.deals-full-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
@media (max-width: 900px) { .deals-full-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px) { .deals-full-grid { grid-template-columns: repeat(2, 1fr); } }

.deal-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; text-decoration: none; color: inherit; display: block;
  transition: border-color 0.2s, transform 0.15s;
}
.deal-card:hover { border-color: #4c6b22; transform: translateY(-2px); }
.deal-card-img { width: 100%; height: 110px; object-fit: cover; display: block; background: var(--border); }
.deal-card-body { padding: 10px 12px 12px; }
.deal-card-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deal-card-price { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.deal-badge { background: #4c6b22; color: #a4d007; font-size: 12px; font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
.deal-orig { color: var(--muted); font-size: 12px; text-decoration: line-through; }
.deal-final { color: #a4d007; font-size: 13px; font-weight: 700; }
.deal-free { color: #57cbde; font-size: 13px; font-weight: 700; }
.deal-no-disc { color: var(--text); font-size: 13px; font-weight: 600; }

/* Sort bar */
.deals-sort { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.deals-sort-label { font-size: 13px; color: var(--muted); }
.deals-sort select {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 13px; cursor: pointer; outline: none;
}

.deals-count { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.deal-card-links { display: flex; gap: 4px; padding: 0 12px 10px; flex-wrap: wrap; }
.deal-link {
  font-size: 11px; padding: 3px 8px; border-radius: 6px; text-decoration: none;
  font-weight: 600; border: 1px solid var(--border); color: var(--muted);
  transition: all 0.15s;
}
.deal-link:hover { border-color: #5865f2; color: var(--text); }
.deal-link-steam { border-color: #1b2838; color: #c7d5e0; }
.deal-link-steam:hover { background: #1b2838; }
.deal-link-cd { border-color: #e85d00; color: #e85d00; }
.deal-link-cd:hover { background: rgba(232,93,0,0.1); }
.deals-empty { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }
.deals-skeleton { background: var(--border); border-radius: 12px; height: 170px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Price History */
.deal-link-ph { border-color: #a4d007; color: #a4d007; cursor: pointer; background: none; }
.deal-link-ph:hover { background: rgba(164,208,7,0.1); }

.ph-modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  align-items: center; justify-content: center; padding: 16px;
}
.ph-modal-overlay.open { display: flex; }
.ph-modal {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  max-width: 540px; width: 100%; padding: 24px; position: relative;
}
.ph-modal-close {
  position: absolute; top: 12px; right: 14px; background: rgba(255,255,255,0.08);
  border: none; color: var(--text); width: 30px; height: 30px; border-radius: 50%;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.ph-modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; padding-right: 36px; }
.ph-modal-current { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.ph-chart-wrap { width: 100%; height: 160px; position: relative; margin-bottom: 16px; }
.ph-chart-wrap svg { width: 100%; height: 100%; }
.ph-stats { display: flex; gap: 20px; flex-wrap: wrap; }
.ph-stat { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 100px; }
.ph-stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.ph-stat-val { font-size: 16px; font-weight: 700; }
.ph-recommendation {
  margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
}
.ph-rec-buy { background: rgba(76,107,34,0.15); border: 1px solid #4c6b22; color: #a4d007; }
.ph-rec-wait { background: rgba(255,107,107,0.1); border: 1px solid #ff6b6b; color: #ff6b6b; }
.ph-rec-ok { background: rgba(88,101,242,0.1); border: 1px solid #5865f2; color: #7c8af2; }
.ph-no-key { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }
</style>

<main>
<div class="deals-wrap">
  <h1 style="font-size:24px;font-weight:700;margin-bottom:6px;">🔥 Steam Хямдрал</h1>
  <p style="color:var(--muted);font-size:14px;margin-bottom:24px;">Steam-н одоогийн хямдрал, шинэ болон эрэлттэй тоглоомууд</p>

  <div class="deals-tabs">
    <button class="deals-tab active" data-tab="specials">⚡ Хямдрал</button>
    <button class="deals-tab" data-tab="topSellers">🏆 Эрэлттэй</button>
    <button class="deals-tab" data-tab="newReleases">✨ Шинэ</button>
  </div>

  <div class="deals-sort">
    <span class="deals-sort-label">Эрэмбэлэх:</span>
    <select id="sort-select" onchange="applySort()">
      <option value="default">Үндсэн</option>
      <option value="disc">Хямдрал (их → бага)</option>
      <option value="price-asc">Үнэ (хямд → үнэтэй)</option>
      <option value="price-desc">Үнэ (үнэтэй → хямд)</option>
      <option value="name">Нэр (А-Я)</option>
    </select>
  </div>

  <div id="deals-count" class="deals-count"></div>
  <div id="deals-grid" class="deals-full-grid">
    {% for i in (1..12) %}
    <div class="deals-skeleton"></div>
    {% endfor %}
  </div>
</div>
</main>

<script>
const WORKER_URL = 'https://respawnmn-steam-api.tsekseven69.workers.dev'

let allData = null
let currentTab = 'specials'

function storeUrl(appid) {
  return `https://store.steampowered.com/app/${appid}/`
}
function cdkeysUrl(name) {
  return `https://www.cdkeys.com/catalogsearch/result/?q=${encodeURIComponent(name)}`
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

async function loadDeals() {
  try {
    const url = new URL(WORKER_URL)
    url.searchParams.set('action', 'deals')
    const res = await fetch(url)
    allData = await res.json()
    renderTab(currentTab)
  } catch(e) {
    document.getElementById('deals-grid').innerHTML = '<div class="deals-empty" style="grid-column:1/-1">Steam дэлгүүрт холбогдож чадсангүй. Дахин оролдоно уу.</div>'
  }
}

function renderTab(tab) {
  currentTab = tab
  if (!allData) return
  let games = [...(allData[tab] || [])]

  const sort = document.getElementById('sort-select').value
  if (sort === 'disc') games.sort((a,b) => b.discountPct - a.discountPct)
  else if (sort === 'price-asc') games.sort((a,b) => a.finalPrice - b.finalPrice)
  else if (sort === 'price-desc') games.sort((a,b) => b.finalPrice - a.finalPrice)
  else if (sort === 'name') games.sort((a,b) => a.name.localeCompare(b.name))

  const count = games.length
  document.getElementById('deals-count').textContent = count ? `${count} тоглоом` : ''

  if (!count) {
    document.getElementById('deals-grid').innerHTML = '<div class="deals-empty" style="grid-column:1/-1">Одоогоор мэдээлэл байхгүй байна</div>'
    return
  }

  document.getElementById('deals-grid').innerHTML = games.map(g => `
    <div class="deal-card">
      <img class="deal-card-img" src="${g.image}" alt="${esc(g.name)}" onerror="this.style.background='var(--border)'">
      <div class="deal-card-body">
        <div class="deal-card-name">${esc(g.name)}</div>
        <div class="deal-card-price">
          ${g.discountPct > 0 ? `<span class="deal-badge">-${g.discountPct}%</span>` : ''}
          ${g.discountPct > 0 && g.originalPrice > 0 ? `<span class="deal-orig">$${(g.originalPrice/100).toFixed(2)}</span>` : ''}
          ${g.finalPrice === 0
            ? '<span class="deal-free">Үнэгүй</span>'
            : g.discountPct > 0
              ? `<span class="deal-final">$${(g.finalPrice/100).toFixed(2)}</span>`
              : `<span class="deal-no-disc">$${(g.finalPrice/100).toFixed(2)}</span>`
          }
        </div>
      </div>
      <div class="deal-card-links">
        <a class="deal-link deal-link-steam" href="${storeUrl(g.appid)}" target="_blank" rel="noopener">Steam</a>
        <a class="deal-link deal-link-cd" href="${cdkeysUrl(g.name)}" target="_blank" rel="noopener">CDKeys</a>
        <button class="deal-link deal-link-ph" onclick="openPriceHistory(${g.appid}, '${esc(g.name)}', ${g.finalPrice}, ${g.originalPrice}, ${g.discountPct})">📊 Түүх</button>
      </div>
    </div>`).join('')
}

function applySort() {
  renderTab(currentTab)
}

document.querySelectorAll('.deals-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.deals-tab').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    renderTab(btn.dataset.tab)
  })
})

// ── Price History Modal ──
async function openPriceHistory(appid, name, finalPrice, origPrice, discPct) {
  const overlay = document.getElementById('ph-modal-overlay')
  const content = document.getElementById('ph-modal-content')
  overlay.classList.add('open')
  document.body.style.overflow = 'hidden'

  const currentStr = finalPrice > 0
    ? `Одоогийн үнэ: $${(finalPrice/100).toFixed(2)}${discPct > 0 ? ` (-${discPct}%)` : ''}`
    : 'Үнэгүй'

  content.innerHTML = `
    <div class="ph-modal-title">${esc(name)}</div>
    <div class="ph-modal-current">${currentStr}</div>
    <div style="text-align:center;padding:30px;color:var(--muted)">⏳ Ачааллаж байна...</div>`

  try {
    const url = new URL(WORKER_URL)
    url.searchParams.set('action', 'pricehistory')
    url.searchParams.set('appid', appid)
    const res = await fetch(url)
    const data = await res.json()

    if (data.error) {
      const isNoKey = data.error.includes('ITAD_API_KEY')
      content.innerHTML = `
        <div class="ph-modal-title">${esc(name)}</div>
        <div class="ph-modal-current">${currentStr}</div>
        <div class="ph-no-key">
          ${isNoKey
            ? '🔑 IsThereAnyDeal API key тохируулагдаагүй байна.<br><small>Cloudflare Worker-т <code>ITAD_API_KEY</code> secret нэм.</small>'
            : esc(data.error)
          }
        </div>`
      return
    }

    const points = data.history || []
    const allPrices = points.map(p => p.price).filter(p => p > 0)
    const lowestPrice = allPrices.length ? Math.min(...allPrices) : null
    const highestPrice = allPrices.length ? Math.max(...allPrices) : null
    const currentDollars = finalPrice / 100
    const isNearLow = lowestPrice && currentDollars <= lowestPrice * 1.1

    const chartSvg = points.length >= 2 ? buildChart(points) : '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">Түүхийн дата хангалтгүй байна</div>'

    let rec = '', recCls = ''
    if (lowestPrice && currentDollars <= lowestPrice) {
      rec = '🎯 Одоо авах хамгийн сайн цаг! Энэ бол түүхэн доод үнэ.'
      recCls = 'ph-rec-buy'
    } else if (lowestPrice && currentDollars <= lowestPrice * 1.15) {
      rec = '✅ Үнэ түүхэн доод түвшинд ойрхон байна. Авахад тохиромжтой.'
      recCls = 'ph-rec-buy'
    } else if (discPct > 0) {
      rec = '⏳ Хямдрал байна, гэхдээ илүү гүн хямдрал хүлээж болно.'
      recCls = 'ph-rec-ok'
    } else {
      rec = '💤 Хямдрал хүлээх нь дээр. Steam Sale-д илүү хямдарна.'
      recCls = 'ph-rec-wait'
    }

    content.innerHTML = `
      <div class="ph-modal-title">${esc(name)}</div>
      <div class="ph-modal-current">${currentStr}</div>
      <div class="ph-chart-wrap">${chartSvg}</div>
      <div class="ph-stats">
        <div class="ph-stat">
          <div class="ph-stat-label">Түүхэн доод үнэ</div>
          <div class="ph-stat-val" style="color:#a4d007">${lowestPrice ? '$' + lowestPrice.toFixed(2) : '—'}</div>
        </div>
        <div class="ph-stat">
          <div class="ph-stat-label">Ердийн үнэ</div>
          <div class="ph-stat-val">${origPrice > 0 ? '$' + (origPrice/100).toFixed(2) : '—'}</div>
        </div>
        <div class="ph-stat">
          <div class="ph-stat-label">Одоогийн үнэ</div>
          <div class="ph-stat-val" style="color:${isNearLow ? '#a4d007' : 'var(--text)'}">${currentDollars > 0 ? '$' + currentDollars.toFixed(2) : 'Үнэгүй'}</div>
        </div>
      </div>
      ${rec ? `<div class="ph-recommendation ${recCls}">${rec}</div>` : ''}`
  } catch(e) {
    content.innerHTML = `
      <div class="ph-modal-title">${esc(name)}</div>
      <div class="ph-modal-current">${currentStr}</div>
      <div class="ph-no-key">Холбогдож чадсангүй. Дахин оролдоно уу.</div>`
  }
}

function buildChart(points) {
  const W = 490, H = 130, PAD = { t: 10, r: 10, b: 24, l: 40 }
  const cw = W - PAD.l - PAD.r
  const ch = H - PAD.t - PAD.b
  const prices = points.map(p => p.price)
  const minP = Math.min(...prices) * 0.9
  const maxP = Math.max(...prices) * 1.1 || 1
  const n = points.length

  const px = (i) => PAD.l + (i / (n - 1)) * cw
  const py = (p) => PAD.t + ch - ((p - minP) / (maxP - minP)) * ch

  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${px(i).toFixed(1)},${py(p.price).toFixed(1)}`).join(' ')
  const areaD = pathD + ` L${px(n-1).toFixed(1)},${(PAD.t+ch).toFixed(1)} L${PAD.l},${(PAD.t+ch).toFixed(1)} Z`

  // Axis labels
  const first = points[0].date.slice(0, 7)
  const last = points[n-1].date.slice(0, 7)
  const mid = points[Math.floor(n/2)].date.slice(0, 7)
  const yLabels = [minP, (minP + maxP) / 2, maxP].map((v, i) => {
    const y = py(v)
    return `<text x="${PAD.l - 4}" y="${y + 4}" text-anchor="end" font-size="10" fill="#666">$${v.toFixed(0)}</text>`
  })

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
    <defs>
      <linearGradient id="phg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4c6b22" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#4c6b22" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <line x1="${PAD.l}" y1="${PAD.t}" x2="${PAD.l}" y2="${PAD.t+ch}" stroke="#333" stroke-width="1"/>
    <line x1="${PAD.l}" y1="${PAD.t+ch}" x2="${PAD.l+cw}" y2="${PAD.t+ch}" stroke="#333" stroke-width="1"/>
    ${yLabels.join('')}
    <text x="${PAD.l}" y="${H}" text-anchor="start" font-size="10" fill="#555">${first}</text>
    <text x="${PAD.l + cw/2}" y="${H}" text-anchor="middle" font-size="10" fill="#555">${mid}</text>
    <text x="${PAD.l + cw}" y="${H}" text-anchor="end" font-size="10" fill="#555">${last}</text>
    <path d="${areaD}" fill="url(#phg)"/>
    <path d="${pathD}" fill="none" stroke="#a4d007" stroke-width="2" stroke-linejoin="round"/>
    ${points.map((p, i) => `<circle cx="${px(i).toFixed(1)}" cy="${py(p.price).toFixed(1)}" r="3" fill="#a4d007"/>`).join('')}
  </svg>`
}

function closePriceHistory(e) {
  if (e && e.target !== document.getElementById('ph-modal-overlay') && !e.target.classList.contains('ph-modal-close')) return
  document.getElementById('ph-modal-overlay').classList.remove('open')
  document.body.style.overflow = ''
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { document.getElementById('ph-modal-overlay').classList.remove('open'); document.body.style.overflow = '' }
})

loadDeals()
</script>

<!-- Price History Modal -->
<div class="ph-modal-overlay" id="ph-modal-overlay" onclick="closePriceHistory(event)">
  <div class="ph-modal">
    <button class="ph-modal-close" onclick="closePriceHistory(event)">✕</button>
    <div id="ph-modal-content"></div>
  </div>
</div>
