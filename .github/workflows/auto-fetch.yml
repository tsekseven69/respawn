name: Auto Fetch Gaming News

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 10:00 Улаанбаатар цаг
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch and translate news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/auto-fetch.mjs

      - name: Commit new posts
        run: |
          git config user.name "RespawnMN Bot"
          git config user.email "bot@respawnmn.site"
          git add _posts/
          git diff --staged --quiet || git commit -m "auto: daily gaming news $(date +%Y-%m-%d)"
          git push
