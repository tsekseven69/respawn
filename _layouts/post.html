---
layout: default
---

<main>
  <div class="post-wrap">
    <a class="post-back" href="{{ '/' | relative_url }}">← Нүүр хуудас</a>
    <div class="post-header">
      <span class="badge {{ page.badge | default: 'badge-blue' }}">{{ page.category | default: 'Мэдээ' }}</span>
      <h1 class="post-title">{{ page.title }}</h1>
      <div class="hero-meta" style="padding:0; border:none; margin-bottom:24px;">
        <span class="time-text" data-date="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</span>
        <span class="post-views" id="post-views" style="margin-left:8px; color:var(--muted); font-size:13px;">👁 ...</span>
        {% if page.translated %}<span class="badge badge-purple" style="margin-left:auto;">🤖 Орчуулсан</span>{% endif %}
      </div>
    </div>
    {% if page.image and page.image != "" %}
    <div class="post-hero-img" style="background-image:url('{{ page.image }}');"></div>
    {% endif %}
    <div class="post-content">
      {{ content }}
    </div>
    <div style="margin-top:40px; padding-top:20px; border-top:0.5px solid var(--border);">
      <a class="post-back" href="{{ '/' | relative_url }}">← Бүх мэдээ харах</a>
    </div>

    <div style="margin-top:40px;">
      <div style="font-size:15px; font-weight:600; margin-bottom:16px; color:var(--text);">💬 Сэтгэгдэл</div>
      <script src="https://giscus.app/client.js"
        data-repo="tsekseven69/respawn"
        data-repo-id="R_kgDOR2iDLA"
        data-category="General"
        data-category-id="DIC_kwDOR2iDLM4C5wY7"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="dark"
        data-lang="en"
        crossorigin="anonymous"
        async>
      </script>
    </div>
  </div>
</main>

<script>
(function() {
  var slug = {{ page.slug | default: page.url | jsonify }};
  var key = slug.replace(/[^a-z0-9-]/gi, '-').replace(/^-+|-+$/g, '').toLowerCase();
  fetch('https://api.countapi.xyz/hit/respawnmn/' + key)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var el = document.getElementById('post-views');
      if (el && d && d.value) {
        el.textContent = '👁 ' + d.value.toLocaleString();
      }
    })
    .catch(function() {
      var el = document.getElementById('post-views');
      if (el) el.textContent = '';
    });
})();
</script>
