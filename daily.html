---
layout: default
title: Өдрийн Challenge
---

<style>
.daily-wrap { max-width: 520px; margin: 0 auto; padding: 24px 16px; }

.daily-header { text-align: center; margin-bottom: 28px; }
.daily-streak {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #4c6b22, #2d4a10);
  padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: 700; color: #a4d007;
  margin-bottom: 12px;
}
.daily-date { font-size: 13px; color: var(--muted); }

.daily-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 28px 24px; margin-bottom: 20px;
}
.daily-num { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.daily-q { font-size: 19px; font-weight: 700; line-height: 1.5; margin-bottom: 24px; color: var(--text); }

.daily-options { display: flex; flex-direction: column; gap: 10px; }
.daily-opt {
  padding: 14px 18px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--card); color: var(--text); font-size: 15px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; text-align: left; width: 100%;
}
.daily-opt:hover:not(.answered) { border-color: #5865f2; background: rgba(88,101,242,0.08); }
.daily-opt.correct { border-color: #4c6b22; background: rgba(76,107,34,0.15); color: #a4d007; }
.daily-opt.wrong { border-color: #5c2020; background: rgba(92,32,32,0.15); color: #e88; }
.daily-opt.answered { cursor: default; }
.daily-opt.dimmed { opacity: 0.5; }

/* Result */
.daily-result {
  text-align: center; padding: 20px; margin-top: 16px; border-radius: 12px;
  font-size: 15px; font-weight: 600;
}
.daily-result.win { background: rgba(76,107,34,0.1); border: 1px solid #4c6b22; color: #a4d007; }
.daily-result.lose { background: rgba(92,32,32,0.1); border: 1px solid #5c2020; color: #e88; }

/* Timer */
.daily-timer {
  text-align: center; margin-top: 20px; padding: 16px;
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
}
.daily-timer-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.daily-timer-val { font-size: 20px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }

/* Share */
.daily-share {
  display: flex; gap: 8px; margin-top: 16px; justify-content: center;
}
.daily-share-btn {
  padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.daily-share-btn:hover { border-color: #5865f2; }

/* History */
.daily-history { margin-top: 28px; }
.daily-hist-title { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 12px; }
.daily-hist-row {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.daily-hist-dot {
  width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 700;
}
.daily-hist-dot.w { background: rgba(76,107,34,0.2); color: #a4d007; }
.daily-hist-dot.l { background: rgba(92,32,32,0.2); color: #e88; }
.daily-hist-dot.s { background: rgba(255,255,255,0.05); color: var(--muted); }
</style>

<main>
<div class="daily-wrap">
  <div class="daily-header">
    <h1 style="font-size:24px;font-weight:700;margin-bottom:8px;">🎯 Өдрийн Challenge</h1>
    <p style="color:var(--muted);font-size:14px;margin-bottom:14px;">Өдөр бүр шинэ gaming асуулт. Streak-ээ барь!</p>
    <div class="daily-streak" id="streak-badge">🔥 <span id="streak-num">0</span> өдрийн streak</div>
    <div class="daily-date" id="daily-date"></div>
  </div>

  <div class="daily-card">
    <div class="daily-num" id="daily-num"></div>
    <div class="daily-q" id="daily-q"></div>
    <div class="daily-options" id="daily-options"></div>
  </div>

  <div id="daily-result-wrap"></div>
  <div id="daily-share-wrap"></div>

  <div class="daily-timer" id="daily-timer">
    <div class="daily-timer-label">Дараагийн асуулт</div>
    <div class="daily-timer-val" id="timer-val">--:--:--</div>
  </div>

  <div class="daily-history" id="daily-history"></div>
</div>
</main>

<script>
const QUESTIONS = {{ site.data.daily | jsonify }};

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function todayIndex() {
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  const day = Math.floor(diff / 86400000);
  return day % QUESTIONS.length;
}

function getData() {
  try { return JSON.parse(localStorage.getItem('rmn_daily') || '{}'); } catch { return {}; }
}
function saveData(d) { localStorage.setItem('rmn_daily', JSON.stringify(d)); }

function getStreak(data) {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (data[key] === 'correct') {
      streak++;
      d.setDate(d.getDate() - 1);
    } else if (data[key] === 'wrong' || i > 0) {
      break;
    } else {
      d.setDate(d.getDate() - 1);
    }
  }
  return streak;
}

function init() {
  const key = todayKey();
  const idx = todayIndex();
  const q = QUESTIONS[idx];
  const data = getData();

  document.getElementById('daily-date').textContent = key;
  document.getElementById('daily-num').textContent = `Асуулт #${idx + 1}`;
  document.getElementById('daily-q').textContent = q.q;

  const streak = getStreak(data);
  document.getElementById('streak-num').textContent = streak;

  const opts = document.getElementById('daily-options');
  const alreadyAnswered = data[key];

  opts.innerHTML = q.a.map((a, i) => {
    let cls = 'daily-opt';
    if (alreadyAnswered) {
      cls += ' answered';
      if (i === q.correct) cls += ' correct';
      else if (alreadyAnswered === 'wrong' && data[key + '_pick'] === i) cls += ' wrong';
      else cls += ' dimmed';
    }
    return `<button class="${cls}" data-idx="${i}" ${alreadyAnswered ? 'disabled' : ''}>${a}</button>`;
  }).join('');

  if (!alreadyAnswered) {
    opts.querySelectorAll('.daily-opt').forEach(btn => {
      btn.addEventListener('click', () => answer(parseInt(btn.dataset.idx)));
    });
  } else {
    showResult(alreadyAnswered === 'correct');
  }

  renderHistory(data);
  startTimer();
}

function answer(idx) {
  const key = todayKey();
  const q = QUESTIONS[todayIndex()];
  const correct = idx === q.correct;
  const data = getData();
  data[key] = correct ? 'correct' : 'wrong';
  data[key + '_pick'] = idx;
  saveData(data);

  const opts = document.querySelectorAll('.daily-opt');
  opts.forEach((btn, i) => {
    btn.classList.add('answered');
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });

  showResult(correct);
  document.getElementById('streak-num').textContent = getStreak(data);
  renderHistory(data);
}

function showResult(correct) {
  const wrap = document.getElementById('daily-result-wrap');
  if (correct) {
    wrap.innerHTML = '<div class="daily-result win">✅ Зөв! Маргааш дахин ирээрэй 🔥</div>';
  } else {
    wrap.innerHTML = '<div class="daily-result lose">❌ Буруу. Маргааш дахин оролдоорой!</div>';
  }

  document.getElementById('daily-share-wrap').innerHTML = `
    <div class="daily-share">
      <button class="daily-share-btn" onclick="shareResult(${correct})">📤 Хуваалцах</button>
    </div>`;
}

function shareResult(correct) {
  const streak = document.getElementById('streak-num').textContent;
  const text = `🎯 RespawnMN Өдрийн Challenge\n${correct ? '✅ Зөв!' : '❌ Буруу'}\n🔥 Streak: ${streak} өдөр\n\nrespawnmn.site/daily`;
  if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text);
    alert('Хуулагдлаа!');
  }
}

function renderHistory(data) {
  const wrap = document.getElementById('daily-history');
  const d = new Date();
  let dots = '';
  for (let i = 6; i >= 0; i--) {
    const dt = new Date(d);
    dt.setDate(dt.getDate() - i);
    const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const val = data[key];
    const cls = val === 'correct' ? 'w' : val === 'wrong' ? 'l' : 's';
    const label = val === 'correct' ? '✓' : val === 'wrong' ? '✗' : '·';
    const dayName = ['Ня','Да','Мя','Лх','Пү','Ба','Бя'][dt.getDay()];
    dots += `<div class="daily-hist-dot ${cls}" title="${key}">${label}<br><span style="font-size:9px;font-weight:400;opacity:0.6">${dayName}</span></div>`;
  }
  wrap.innerHTML = `<div class="daily-hist-title">Сүүлийн 7 хоног</div><div class="daily-hist-row">${dots}</div>`;
}

function startTimer() {
  function update() {
    const now = new Date();
    const tomorrow = new Date(now);
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(0, 0, 0, 0);
    const diff = tomorrow - now;
    const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
    document.getElementById('timer-val').textContent = `${h}:${m}:${s}`;
  }
  update();
  setInterval(update, 1000);
}

init();
</script>
