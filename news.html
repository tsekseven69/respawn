---
layout: default
title: Steam Мэдээ
---

<style>
.news-wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

.news-feed { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 800px) { .news-feed { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .news-feed { grid-template-columns: 1fr; } }

.news-item {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; cursor: pointer; display: block;
  transition: border-color 0.2s, transform 0.15s;
}
.news-item:hover { border-color: #5865f2; transform: translateY(-2px); }
.news-item-img { width: 100%; height: 120px; object-fit: cover; display: block; background: var(--border); }
.news-item-body { padding: 12px 14px; }
.news-item-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.news-item-desc {
  font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.news-item-footer { display: flex; align-items: center; justify-content: space-between; }
.news-item-date { font-size: 11px; color: var(--muted); }
.news-item-no-img {
  height: 120px; display: flex; align-items: center; justify-content: center;
  font-size: 40px; background: linear-gradient(135deg, #1b2838, #2a475e);
}

.news-modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  align-items: flex-start; justify-content: center; padding: 24px 16px; overflow-y: auto;
}
.news-modal-overlay.open { display: flex; }
.news-modal {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  max-width: 600px; width: 100%; position: relative; margin: auto;
}
.news-modal-img { width: 100%; height: 160px; object-fit: cover; display: block; border-radius: 16px 16px 0 0; }
.news-modal-no-img {
  height: 120px; display: flex; align-items: center; justify-content: center;
  font-size: 48px; background: linear-gradient(135deg, #1b2838, #2a475e);
  border-radius: 16px 16px 0 0;
}
.news-modal-body { padding: 20px 24px 24px; }
.news-modal-title { font-size: 18px; font-weight: 800; line-height: 1.4; margin-bottom: 10px; color: var(--text); }
.news-modal-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.news-modal-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
.news-modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.news-modal-steam {
  padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 700;
  background: #1b2838; color: #c7d5e0; border: 1px solid #4c6b22;
  text-decoration: none; transition: background 0.2s;
}
.news-modal-steam:hover { background: #2a475e; }
.news-modal-close {
  position: absolute; top: 12px; right: 14px;
  background: rgba(0,0,0,0.5); border: none; color: #fff;
  width: 32px; height: 32px; border-radius: 50%; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 10; line-height: 1;
}

.news-skeleton { background: var(--border); border-radius: 12px; height: 220px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>

<main>
<div class="news-wrap">
  <h1 style="font-size:24px;font-weight:700;margin-bottom:6px;">📰 Steam Мэдээ</h1>
  <p style="color:var(--muted);font-size:14px;margin-bottom:24px;">Steam-ийн сүүлийн үеийн мэдээ, шинэчлэлүүд — Монгол хэлээр</p>

  <div id="news-feed" class="news-feed">
    {% for i in (1..6) %}
    <div class="news-skeleton"></div>
    {% endfor %}
  </div>
</div>
</main>

<div class="news-modal-overlay" id="news-modal-overlay" onclick="closeNewsModal(event)">
  <div class="news-modal" id="news-modal">
    <button class="news-modal-close" onclick="closeNewsModal()">✕</button>
    <div id="news-modal-content"></div>
  </div>
</div>

<script>
const WORKER_URL = 'https://respawnmn-steam-api.tsekseven69.workers.dev'
let newsData = []

async function loadNews() {
  try {
    const url = new URL(WORKER_URL)
    url.searchParams.set('action', 'steamnews')
    const res = await fetch(url)
    const data = await res.json()
    renderNews(data.news || [])
  } catch(e) {
    document.getElementById('news-feed').innerHTML = '<div style="color:var(--muted);grid-column:1/-1;text-align:center;padding:40px;">Мэдээ ачааллагдсангүй</div>'
  }
}

function renderNews(news) {
  newsData = news
  const feed = document.getElementById('news-feed')
  if (!news.length) {
    feed.innerHTML = '<div style="color:var(--muted);grid-column:1/-1;text-align:center;padding:40px;">Мэдээ байхгүй байна</div>'
    return
  }
  feed.innerHTML = news.map((n, i) => {
    const date = n.date ? new Date(n.date).toLocaleDateString('mn-MN', { month: 'short', day: 'numeric' }) : ''
    const title = esc(n.titleMn || n.title)
    const desc = esc(n.descMn || n.description || '')
    const imgHtml = n.image
      ? `<img class="news-item-img" src="${n.image}" alt="" onerror="this.outerHTML='<div class=\\'news-item-no-img\\'>📰</div>'">`
      : `<div class="news-item-no-img">📰</div>`
    return `
    <div class="news-item" onclick="openNewsModal(${i})">
      ${imgHtml}
      <div class="news-item-body">
        <div class="news-item-title">${title}</div>
        <div class="news-item-desc">${desc}</div>
        <div class="news-item-footer">
          <span class="news-item-date">${date}</span>
        </div>
      </div>
    </div>`
  }).join('')
}

function openNewsModal(idx) {
  const n = newsData[idx]
  if (!n) return
  const date = n.date ? new Date(n.date).toLocaleDateString('mn-MN', { year: 'numeric', month: 'long', day: 'numeric' }) : ''
  const title = esc(n.titleMn || n.title)
  const desc = esc(n.descMn || n.description || '')
  const imgHtml = n.image
    ? `<img class="news-modal-img" src="${n.image}" alt="" onerror="this.outerHTML='<div class=\\'news-modal-no-img\\'>📰</div>'">`
    : `<div class="news-modal-no-img">📰</div>`
  const steamBtn = n.link
    ? `<a class="news-modal-steam" href="${n.link}" target="_blank" rel="noopener">🔗 Эх сурвалж харах</a>`
    : ''
  document.getElementById('news-modal-content').innerHTML = `
    ${imgHtml}
    <div class="news-modal-body">
      <div class="news-modal-title">${title}</div>
      <div class="news-modal-meta">${date}</div>
      <div class="news-modal-desc">${desc}</div>
      <div class="news-modal-actions">${steamBtn}</div>
    </div>`
  document.getElementById('news-modal-overlay').classList.add('open')
  document.body.style.overflow = 'hidden'
}

function closeNewsModal(e) {
  if (e && e.target !== document.getElementById('news-modal-overlay') && !e.target.classList.contains('news-modal-close')) return
  document.getElementById('news-modal-overlay').classList.remove('open')
  document.body.style.overflow = ''
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('news-modal-overlay').classList.remove('open')
    document.body.style.overflow = ''
  }
})

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

loadNews()
</script>
