---
layout: default
title: Тоглоомын хуанли
---

<style>
.cal-wrap { max-width: 820px; margin: 0 auto; padding: 24px 16px; }

/* ── Steam Sale Countdown ── */
.sales-section { margin-bottom: 36px; }
.sales-section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.sales-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 700px) { .sales-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 420px) { .sales-grid { grid-template-columns: 1fr; } }

.sale-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 16px; position: relative; overflow: hidden; transition: border-color 0.2s;
}
.sale-card.active-sale { border-color: #a4d007; background: rgba(164,208,7,0.07); }
.sale-card.next-sale { border-color: #5865f2; }
.sale-card:hover { border-color: #5865f2; }
.sale-card-emoji { font-size: 28px; margin-bottom: 8px; display: block; }
.sale-card-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.sale-card-dates { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
.sale-countdown {
  font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums;
}
.sale-countdown.live { color: #a4d007; }
.sale-countdown.soon { color: #ff6b6b; }
.sale-countdown.future { color: #57cbde; }
.sale-countdown.done { color: var(--muted); font-size: 13px; font-weight: 600; }
.sale-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.sale-live-badge {
  position: absolute; top: 12px; right: 12px;
  background: #a4d007; color: #111; font-size: 10px; font-weight: 800;
  padding: 2px 7px; border-radius: 10px; text-transform: uppercase;
}

/* ── Tabs ── */
.cal-tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
.cal-tab {
  padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--card); color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.cal-tab:hover { border-color: #5865f2; color: var(--text); }
.cal-tab.active { background: #5865f2; border-color: #5865f2; color: #fff; }

/* ── Month group ── */
.cal-month { font-size: 14px; font-weight: 700; color: #5865f2; margin: 28px 0 12px; text-transform: uppercase; letter-spacing: 1px; }
.cal-month:first-child { margin-top: 0; }

/* ── Game card ── */
.cal-game {
  display: flex; align-items: center; gap: 14px; padding: 14px 16px;
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  margin-bottom: 8px; transition: border-color 0.2s;
}
.cal-game:hover { border-color: #5865f2; }
.cal-game-emoji { font-size: 28px; flex-shrink: 0; width: 42px; text-align: center; }
.cal-game-img { width: 60px; height: 28px; object-fit: cover; border-radius: 5px; flex-shrink: 0; background: var(--border); }
.cal-game-info { flex: 1; min-width: 0; }
.cal-game-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-game-meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.cal-game-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

.cal-platform {
  display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px;
  font-weight: 600; background: rgba(255,255,255,0.06); color: var(--muted);
}
.cal-countdown {
  font-size: 12px; font-weight: 600; flex-shrink: 0; text-align: right; min-width: 80px;
}
.cal-countdown.released { color: #a4d007; }
.cal-countdown.upcoming { color: #57cbde; }
.cal-countdown.soon { color: #ff6b6b; }

.cal-empty { text-align: center; padding: 40px; color: var(--muted); }
.cal-skeleton { background: var(--border); border-radius: 12px; height: 64px; animation: pulse 1.5s ease-in-out infinite; margin-bottom: 8px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Notify btn ── */
.cal-notify {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: none; color: var(--muted); font-size: 12px; cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.cal-notify:hover { border-color: #5865f2; color: var(--text); }
.cal-notify.on { background: rgba(88,101,242,0.15); border-color: #5865f2; color: #5865f2; }
</style>

<main>
<div class="cal-wrap">
  <h1 style="font-size:24px;font-weight:700;margin-bottom:6px;">📅 Тоглоомын хуанли</h1>
  <p style="color:var(--muted);font-size:14px;margin-bottom:28px;">Steam хямдрал, гарах тоглоомуудын хуваарь</p>

  <!-- STEAM SALE COUNTDOWN -->
  <div class="sales-section">
    <div class="sales-section-title">🔥 Steam хямдралын хуваарь <span style="font-size:13px;font-weight:400;color:var(--muted);">— 2026</span></div>
    <div class="sales-grid" id="sales-grid"></div>
  </div>

  <!-- GAME RELEASES TABS -->
  <div class="cal-tabs">
    <button class="cal-tab active" data-tab="static" data-filter="all">📅 Бүгд</button>
    <button class="cal-tab" data-tab="static" data-filter="upcoming">⏳ Удахгүй</button>
    <button class="cal-tab" data-tab="static" data-filter="released">✅ Гарсан</button>
    <button class="cal-tab" data-tab="live">🌐 Steam шууд</button>
  </div>

  <div id="cal-feed">
    {% for i in (1..5) %}
    <div class="cal-skeleton"></div>
    {% endfor %}
  </div>
</div>
</main>

<script>
const WORKER_URL = 'https://respawnmn-steam-api.tsekseven69.workers.dev'
const RELEASES = {{ site.data.releases | jsonify }};
const MONTHS_MN = ['1-р сар','2-р сар','3-р сар','4-р сар','5-р сар','6-р сар','7-р сар','8-р сар','9-р сар','10-р сар','11-р сар','12-р сар'];

// ── Steam Sale Schedule ──
const STEAM_SALES = [
  { name: 'Lunar New Year Sale', nameMn: 'Цагаан сарын хямдрал', emoji: '🧧', start: '2026-01-28', end: '2026-02-11' },
  { name: 'Spring Sale', nameMn: 'Хаврын хямдрал', emoji: '🌸', start: '2026-03-19', end: '2026-03-26' },
  { name: 'Summer Sale', nameMn: 'Зуны хямдрал', emoji: '☀️', start: '2026-06-25', end: '2026-07-09' },
  { name: 'Halloween Sale', nameMn: 'Halloween хямдрал', emoji: '🎃', start: '2026-10-28', end: '2026-11-01' },
  { name: 'Autumn Sale', nameMn: 'Намрын хямдрал', emoji: '🍂', start: '2026-11-25', end: '2026-12-02' },
  { name: 'Winter Sale', nameMn: 'Өвлийн хямдрал', emoji: '❄️', start: '2026-12-17', end: '2027-01-02' },
]

function renderSales() {
  const now = new Date()
  const grid = document.getElementById('sales-grid')

  grid.innerHTML = STEAM_SALES.map(s => {
    const start = new Date(s.start + 'T00:00:00')
    const end = new Date(s.end + 'T23:59:59')
    const isLive = now >= start && now <= end
    const daysToStart = Math.ceil((start - now) / 86400000)
    const daysToEnd = Math.ceil((end - now) / 86400000)
    const isPast = now > end

    let countdownHtml, labelHtml, cardClass = 'sale-card'
    if (isLive) {
      countdownHtml = `<div class="sale-countdown live">🔴 LIVE</div>`
      labelHtml = `<div class="sale-label">${daysToEnd} хоногийн дараа дуусна</div>`
      cardClass += ' active-sale'
    } else if (isPast) {
      countdownHtml = `<div class="sale-countdown done">✓ Өнгөрсөн</div>`
      labelHtml = `<div class="sale-label">2027-д буцаж ирнэ</div>`
    } else if (daysToStart <= 30) {
      countdownHtml = `<div class="sale-countdown soon">${daysToStart} хоног</div>`
      labelHtml = `<div class="sale-label">эхлэхэд үлдлээ</div>`
      cardClass += ' next-sale'
    } else {
      countdownHtml = `<div class="sale-countdown future">${daysToStart} хоног</div>`
      labelHtml = `<div class="sale-label">эхлэхэд үлдлээ</div>`
    }

    const dateStr = `${start.getDate()} ${MONTHS_MN[start.getMonth()]} – ${end.getDate()} ${MONTHS_MN[end.getMonth()]}`

    return `
    <div class="${cardClass}">
      ${isLive ? '<div class="sale-live-badge">LIVE</div>' : ''}
      <span class="sale-card-emoji">${s.emoji}</span>
      <div class="sale-card-name">${s.nameMn}</div>
      <div class="sale-card-dates">${dateStr}</div>
      ${countdownHtml}
      ${labelHtml}
    </div>`
  }).join('')
}

// ── Static releases ──
let currentFilter = 'all'
let currentTab = 'static'

function getReminders() {
  try { return JSON.parse(localStorage.getItem('rmn_cal_remind') || '{}'); } catch { return {}; }
}
function saveReminders(d) { localStorage.setItem('rmn_cal_remind', JSON.stringify(d)); }

function toggleRemind(name) {
  const r = getReminders()
  if (r[name]) delete r[name]; else r[name] = true
  saveReminders(r)
  if (currentTab === 'static') renderStatic()
}

function renderStatic() {
  const now = new Date()
  const reminders = getReminders()
  let games = RELEASES.map(g => {
    const d = new Date(g.date + 'T00:00:00')
    const diff = d - now
    const days = Math.ceil(diff / 86400000)
    return { ...g, dateObj: d, days }
  }).sort((a, b) => a.dateObj - b.dateObj)

  if (currentFilter === 'upcoming') games = games.filter(g => g.days > 0)
  else if (currentFilter === 'released') games = games.filter(g => g.days <= 0)

  if (!games.length) {
    document.getElementById('cal-feed').innerHTML = '<div class="cal-empty">Тоглоом олдсонгүй</div>'
    return
  }

  let html = ''
  let lastMonth = ''

  games.forEach(g => {
    const monthKey = `${g.dateObj.getFullYear()} ${MONTHS_MN[g.dateObj.getMonth()]}`
    if (monthKey !== lastMonth) {
      html += `<div class="cal-month">${monthKey}</div>`
      lastMonth = monthKey
    }

    let countdown, cls
    if (g.days <= 0) { countdown = '✅ Гарсан'; cls = 'released' }
    else if (g.days <= 7) { countdown = `🔴 ${g.days} хоног`; cls = 'soon' }
    else { countdown = `${g.days} хоног`; cls = 'upcoming' }

    const isRemind = reminders[g.name]
    html += `
    <div class="cal-game">
      <div class="cal-game-emoji">${g.emoji}</div>
      <div class="cal-game-info">
        <div class="cal-game-name">${esc(g.name)}</div>
        <div class="cal-game-meta">
          <span>${g.date}</span>
          <span class="cal-platform">${esc(g.platform)}</span>
        </div>
        <div class="cal-game-desc">${esc(g.desc)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        <div class="cal-countdown ${cls}">${countdown}</div>
        ${g.days > 0 ? `<button class="cal-notify ${isRemind ? 'on' : ''}" onclick="toggleRemind('${esc(g.name)}')">${isRemind ? '🔔 Сануулсан' : '🔕 Сануулах'}</button>` : ''}
      </div>
    </div>`
  })

  document.getElementById('cal-feed').innerHTML = html
}

// ── Live Steam coming soon ──
async function renderLive() {
  const feed = document.getElementById('cal-feed')
  feed.innerHTML = Array(5).fill('<div class="cal-skeleton"></div>').join('')
  try {
    const url = new URL(WORKER_URL)
    url.searchParams.set('action', 'comingsoon')
    const res = await fetch(url)
    const data = await res.json()
    const games = data.games || []

    if (!games.length) {
      feed.innerHTML = '<div class="cal-empty">Мэдээлэл байхгүй байна</div>'
      return
    }

    feed.innerHTML = games.map(g => {
      const dateStr = g.releaseDateStr || g.releaseDate || 'Тодорхойгүй'
      const price = g.price === 0 ? 'Үнэгүй' : g.price ? `$${(g.price/100).toFixed(2)}` : ''
      return `
      <div class="cal-game">
        <img class="cal-game-img" src="${g.image}" alt="" onerror="this.style.display='none'">
        <div class="cal-game-info">
          <div class="cal-game-name">${esc(g.name)}</div>
          <div class="cal-game-meta">
            <span>📅 ${esc(dateStr)}</span>
            <span class="cal-platform">Steam</span>
            ${price ? `<span style="color:#a4d007;font-weight:700">${price}</span>` : ''}
          </div>
        </div>
        <div>
          <a href="https://store.steampowered.com/app/${g.appid}/" target="_blank" rel="noopener"
             style="font-size:12px;color:#5865f2;text-decoration:none;">Steam →</a>
        </div>
      </div>`
    }).join('')
  } catch(e) {
    feed.innerHTML = '<div class="cal-empty">Steam-тэй холбогдож чадсангүй</div>'
  }
}

// ── Tab logic ──
document.querySelectorAll('.cal-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cal-tab').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    currentTab = btn.dataset.tab
    if (currentTab === 'live') {
      renderLive()
    } else {
      currentFilter = btn.dataset.filter || 'all'
      renderStatic()
    }
  })
})

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

renderSales()
renderStatic()

// Refresh sale countdowns every minute
setInterval(renderSales, 60000)
</script>
